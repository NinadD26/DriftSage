name: Terraform Drift Scan (Real Infra)

# Generic drift scan for any Terraform project(s) configured
# in config/config.yaml under "targets". Works with any cloud
# provider/backend - Terraform's own backend.tf and provider
# blocks in each target directory handle that.
#
# Requirements before enabling this workflow:
#   1. Add your target(s) to config/config.yaml
#   2. Add cloud credentials as repo secrets (examples below
#      show AWS; swap for GCP/Azure equivalents as needed)
#   3. Add GROQ_API_KEY as a repo secret

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"   # daily at 4am UTC

jobs:
  drift-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.11.0"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # No "terraform init/apply" or drift-simulation steps here -
      # real infra already exists; main.py runs "terraform init"
      # per target itself, then a refresh-only plan to detect
      # whatever has actually drifted since the last apply.

      - name: Run drift scan across all configured targets
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          # Uncomment and configure for your cloud provider:
          # AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          # AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: python app/main.py

      - name: Upload drift reports (all targets)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-reports-${{ github.sha }}
          path: reports/
          if-no-files-found: ignore
